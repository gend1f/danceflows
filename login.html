<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - DanceFlow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo-link">
                <svg class="logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="8" r="4" fill="url(#grad1)"/>
                    <path d="M20 12 C18 14, 16 18, 15 22" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" fill="none"/>
                    <path d="M19 14 C17 13, 14 11, 12 8" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" fill="none"/>
                    <path d="M20 14 C23 16, 26 17, 30 15" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" fill="none"/>
                    <path d="M16 22 C14 26, 12 30, 10 34" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" fill="none"/>
                    <path d="M15.5 22 C18 26, 22 30, 26 32" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" fill="none"/>
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
                <span class="logo-text">DanceFlow</span>
            </a>

            <!-- Desktop Navigation -->
            <nav class="nav-desktop">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="courses.html" class="nav-link">Курсы</a>
                <a href="about.html" class="nav-link">О нас</a>
                <a href="contact.html" class="nav-link">Контакты</a>
            </nav>

            <div class="header-actions">
                <a href="login.html" class="btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
                    </svg>
                    Вход
                </a>
                <a href="register.html" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                    Регистрация
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- Mobile Navigation -->
        <nav class="nav-mobile" id="mobileNav">
            <a href="index.html" class="nav-link-mobile">Главная</a>
            <a href="courses.html" class="nav-link-mobile">Курсы</a>
            <a href="about.html" class="nav-link-mobile">О нас</a>
            <a href="contact.html" class="nav-link-mobile">Контакты</a>
            
            <div class="mobile-actions">
                <a href="login.html" class="btn-mobile">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
                    </svg>
                    Вход
                </a>
                <a href="register.html" class="btn-mobile-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                    </svg>
                    Регистрация
                </a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <section class="auth-section">
            <div class="container">
                <div class="auth-container">
                    <!-- Left Side - Image -->
                    <div class="auth-image">
                        <img src="https://images.unsplash.com/photo-1508807526345-15e9b5f4eaff?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=800" alt="Dance">
                        <div class="auth-image-overlay">
                            <h2>Добро пожаловать обратно!</h2>
                            <p>Войдите в свой аккаунт и продолжайте свой танцевальный путь</p>
                        </div>
                    </div>

                    <!-- Right Side - Form -->
                    <div class="auth-form-container">
                        <div class="auth-form-header">
                            <h1>Вход в аккаунт</h1>
                            <p>Введите свои данные для входа</p>
                        </div>

                        <form class="auth-form" onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <div class="input-with-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                        <polyline points="22,6 12,13 2,6"/>
                                    </svg>
                                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="password">Пароль</label>
                                <div class="input-with-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                                    </svg>
                                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="form-options">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="remember">
                                    <span>Запомнить меня</span>
                                </label>
                                <a href="#" class="forgot-password">Забыли пароль?</a>
                            </div>

                            <button type="submit" class="btn-submit">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
                                </svg>
                                Войти
                            </button>
                        </form>

                        <div class="auth-divider">
                            <span>или</span>
                        </div>

                        <!-- Вход через Google -->
                        <div class="social-auth">
                            <button type="button" class="btn-social">
                                <!-- Google Logo -->
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 8px;">
                                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
                                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"></path>
                                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
                                </svg>
                                <span>Войти через Google</span>
                            </button>
                        </div>

                        <div class="auth-footer">
                            <p>Нет аккаунта? <a href="register.html" class="auth-link">Зарегистрироваться</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function toggleMobileMenu() {
            const nav = document.getElementById('mobileNav');
            nav.classList.toggle('active');
        }

        function handleLogin(event) {
            event.preventDefault();
            alert('Функция входа находится в разработке');
        }
    </script>
</body>
</html>
